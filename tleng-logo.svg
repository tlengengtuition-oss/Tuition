<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8d5a3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="160" fill="#1a1a2e" rx="4"/>

  <!-- Decorative left border accent -->
  <rect x="0" y="0" width="4" height="160" fill="url(#goldGrad)" rx="2"/>

  <!-- Monogram circle -->
  <circle cx="68" cy="80" r="44" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <circle cx="68" cy="80" r="38" fill="none" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>

  <!-- T-L monogram -->
  <!-- T -->
  <text x="44" y="96" font-family="Georgia, serif" font-size="42" font-weight="400" fill="#f5f0e8" letter-spacing="-2">T</text>
  <!-- Hyphen divider -->
  <line x1="68" y1="68" x2="68" y2="92" stroke="url(#goldGrad)" stroke-width="1.2"/>
  <!-- L -->
  <text x="71" y="96" font-family="Georgia, serif" font-size="42" font-weight="400" fill="url(#goldGrad)" letter-spacing="0">L</text>

  <!-- Divider line -->
  <line x1="128" y1="40" x2="128" y2="120" stroke="rgba(201,168,76,0.25)" stroke-width="1"/>

  <!-- Main name -->
  <text x="148" y="75" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="400" fill="#f5f0e8" letter-spacing="3">T-LENG</text>

  <!-- Gold underline accent -->
  <line x1="148" y1="83" x2="340" y2="83" stroke="url(#goldGrad)" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="149" y="106" font-family="Arial, sans-serif" font-size="10.5" font-weight="400" fill="rgba(245,240,232,0.55)" letter-spacing="3.5">PRIVATE TUTOR · SINGAPORE</text>

  <!-- Small decorative dots -->
  <circle cx="354" cy="65" r="2" fill="rgba(201,168,76,0.4)"/>
  <circle cx="362" cy="65" r="2" fill="rgba(201,168,76,0.25)"/>
  <circle cx="370" cy="65" r="2" fill="rgba(201,168,76,0.12)"/>
</svg>
